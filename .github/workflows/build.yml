name: 🎵 Build SongFinder APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔧 Gradle izni
        run: chmod +x gradlew

      - name: 🔨 Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          LASTFM_API_KEY:   ${{ secrets.LASTFM_API_KEY }}
          ACR_HOST:         ${{ secrets.ACR_HOST }}
          ACR_ACCESS_KEY:   ${{ secrets.ACR_ACCESS_KEY }}
          ACR_SECRET_KEY:   ${{ secrets.ACR_SECRET_KEY }}

      - name: 🚀 Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          LASTFM_API_KEY:   ${{ secrets.LASTFM_API_KEY }}
          ACR_HOST:         ${{ secrets.ACR_HOST }}
          ACR_ACCESS_KEY:   ${{ secrets.ACR_ACCESS_KEY }}
          ACR_SECRET_KEY:   ${{ secrets.ACR_SECRET_KEY }}

      - name: 📤 Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongFinder-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: 📤 Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongFinder-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "## 🎵 SongFinder Build" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build  | \`#${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
