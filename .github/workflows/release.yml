name: 🚀 Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔧 Gradle izni
        run: chmod +x gradlew

      - name: 🏗️ Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          LASTFM_API_KEY:   ${{ secrets.LASTFM_API_KEY }}
          ACR_HOST:         ${{ secrets.ACR_HOST }}
          ACR_ACCESS_KEY:   ${{ secrets.ACR_ACCESS_KEY }}
          ACR_SECRET_KEY:   ${{ secrets.ACR_SECRET_KEY }}

      - name: 📝 APK'yı yeniden adlandır
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SongFinder-${{ github.ref_name }}.apk

      - name: 📤 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongFinder-${{ github.ref_name }}
          path: app/build/outputs/apk/release/SongFinder-*.apk
          retention-days: 90

      - name: 🎉 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SongFinder ${{ github.ref_name }}"
          body: |
            ## 🎵 SongFinder ${{ github.ref_name }}

            ### Özellikler
            - 🎙️ **Quick Settings Tile** — Bildirim panelinden tek tuşla dinle
            - 🔊 **ACRCloud ses tanıma** — 10 saniye dinler, şarkıyı bulur
            - 🎵 **MYT Müzik entegrasyonu** — Bulunan şarkıyı otomatik açar
            - 📋 **Pano** — Şarkı adı otomatik kopyalanır

            ### Kurulum
            1. APK'yı indir → yükle
            2. `local.properties` → ACRCloud ve Last.fm key'lerini gir
            3. Bildirim paneli → Düzenle → **"Şarkı Tanı"** tile'ını ekle

            ### API Key Alma
            - **ACRCloud:** https://console.acrcloud.com (ücretsiz, 100 istek/gün)
            - **Last.fm:** https://www.last.fm/api/account/create (ücretsiz)
          files: app/build/outputs/apk/release/SongFinder-*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
